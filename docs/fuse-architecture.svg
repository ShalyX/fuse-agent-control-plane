<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Fuse architecture</title><desc id="desc">Agent branches call the Fuse gateway, which meters provider usage, holds responses behind Circle Gateway payments, persists state in Postgres, and opens and closes a mandate on Arc.</desc>
<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1b1d21" stroke-width="1"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#7170ff"/></marker><filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity=".35"/></filter></defs>
<rect width="1600" height="900" fill="#08090a"/><rect width="1600" height="900" fill="url(#grid)" opacity=".5"/>
<text x="80" y="86" fill="#f7f8f8" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="700" letter-spacing="-1.5">Fuse system architecture</text><text x="80" y="118" fill="#777d87" font-family="ui-monospace,monospace" font-size="14">EXACT INFERENCE PAYMENT · BRANCH-LOCAL CONTAINMENT · ARC COMMITMENT</text>
<g fill="none" stroke="#7170ff" stroke-width="2" marker-end="url(#arrow)"><path d="M320 310H480"/><path d="M790 310H960"/><path d="M1190 310H1350"/><path d="M635 390V560"/><path d="M710 610H930"/><path d="M1100 560V390" stroke-dasharray="7 7"/></g>
<g font-family="Inter,Arial,sans-serif" filter="url(#shadow)"><rect x="80" y="205" width="240" height="210" rx="12" fill="#0f1011" stroke="#363942"/><text x="108" y="243" fill="#8a8f98" font-family="ui-monospace,monospace" font-size="12">CALLING AGENTS</text><g><rect x="108" y="270" width="184" height="36" rx="6" fill="#151719" stroke="#ef6752"/><text x="125" y="293" fill="#f7f8f8" font-size="13">Scout · TRIPPED</text><rect x="108" y="319" width="184" height="36" rx="6" fill="#151719" stroke="#36b562"/><text x="125" y="342" fill="#f7f8f8" font-size="13">Builder · HEALTHY</text><rect x="108" y="368" width="184" height="36" rx="6" fill="#151719" stroke="#36b562"/><text x="125" y="391" fill="#f7f8f8" font-size="13">Reviewer · HEALTHY</text></g>
<rect x="480" y="190" width="310" height="250" rx="12" fill="#101112" stroke="#7170ff"/><text x="510" y="230" fill="#f7f8f8" font-size="19" font-weight="700">Fuse gateway</text><text x="510" y="258" fill="#8a8f98" font-family="ui-monospace,monospace" font-size="11">OPENAI-COMPATIBLE EDGE</text><g fill="#cfd3da" font-size="13"><text x="510" y="302">1. Reserve child allowance</text><text x="510" y="334">2. Call provider once</text><text x="510" y="366">3. Price reported usage</text><text x="510" y="398">4. Hold behind HTTP 402</text></g>
<rect x="960" y="205" width="230" height="210" rx="12" fill="#0f1011" stroke="#94a3b8"/><text x="990" y="246" fill="#f7f8f8" font-size="17" font-weight="700">Anthropic</text><text x="990" y="272" fill="#8a8f98" font-family="ui-monospace,monospace" font-size="11">OFFICIAL MESSAGES API</text><text x="990" y="326" fill="#cfd3da" font-size="13">Provider-reported</text><text x="990" y="350" fill="#cfd3da" font-size="13">input + output tokens</text><text x="990" y="386" fill="#e4ad3a" font-family="ui-monospace,monospace" font-size="10">ACCESS PENDING FUNDING</text>
<rect x="1350" y="220" width="180" height="180" rx="12" fill="#0f1011" stroke="#a78bfa"/><text x="1378" y="260" fill="#f7f8f8" font-size="17" font-weight="700">Response</text><text x="1378" y="290" fill="#8a8f98" font-family="ui-monospace,monospace" font-size="10">RELEASED AFTER PAY</text><text x="1378" y="342" fill="#cfd3da" font-size="13">Same cached</text><text x="1378" y="365" fill="#cfd3da" font-size="13">completion</text>
<rect x="420" y="560" width="290" height="190" rx="12" fill="#0f1011" stroke="#a78bfa"/><text x="450" y="602" fill="#f7f8f8" font-size="18" font-weight="700">Neon Postgres</text><text x="450" y="628" fill="#8a8f98" font-family="ui-monospace,monospace" font-size="10">DURABLE CONTROL STATE</text><text x="450" y="675" fill="#cfd3da" font-size="13">Held responses · circuits</text><text x="450" y="700" fill="#cfd3da" font-size="13">receipts · reclaim events</text>
<rect x="930" y="535" width="340" height="240" rx="12" fill="#0f1011" stroke="#34d399"/><text x="960" y="577" fill="#f7f8f8" font-size="18" font-weight="700">Circle Gateway</text><text x="960" y="603" fill="#8a8f98" font-family="ui-monospace,monospace" font-size="10">EIP-3009 · ARC TESTNET</text><text x="960" y="650" fill="#cfd3da" font-size="13">Exact micro-USDC authorization</text><text x="960" y="676" fill="#cfd3da" font-size="13">Pending-batch settlement receipts</text><rect x="960" y="712" width="280" height="38" rx="6" fill="#11191a" stroke="#36b562"/><text x="979" y="736" fill="#36b562" font-family="ui-monospace,monospace" font-size="11">ACCEPTED · PENDING_BATCH</text>
<rect x="1320" y="555" width="210" height="200" rx="12" fill="#0f1011" stroke="#fbbf24"/><text x="1350" y="597" fill="#f7f8f8" font-size="18" font-weight="700">Arc mandate</text><text x="1350" y="623" fill="#8a8f98" font-family="ui-monospace,monospace" font-size="10">TWO TRANSACTIONS</text><text x="1350" y="670" fill="#cfd3da" font-size="13">01 · open cap</text><text x="1350" y="696" fill="#cfd3da" font-size="13">02 · close total</text><text x="1350" y="722" fill="#cfd3da" font-size="13">+ receipt hash</text></g>
<text x="80" y="842" fill="#62666d" font-family="ui-monospace,monospace" font-size="12">OFF-CHAIN: usage, payment authorization, circuit policy, receipts</text><text x="1060" y="842" fill="#62666d" font-family="ui-monospace,monospace" font-size="12">ON-CHAIN: mandate open + aggregate close</text>
</svg>
